name: Publish Homebrew Tap

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.2.4"
        required: true
        type: string

permissions:
  contents: read

jobs:
  resolve-release:
    name: Resolve release tag
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve release metadata
        id: resolve
        shell: bash
        env:
          INPUT_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || '' }}
          HEAD_BRANCH: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || '' }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ -n "${INPUT_TAG}" ]]; then
            raw_tag="${INPUT_TAG}"
          elif [[ "${HEAD_BRANCH}" == v* ]]; then
            raw_tag="${HEAD_BRANCH}"
          else
            raw_tag="$(
              curl -fsSL \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "${GITHUB_API_URL}/repos/${{ github.repository }}/releases/latest" \
              | jq -r '.tag_name'
            )"
          fi

          version="${raw_tag#v}"
          tag="v${version}"

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

  publish-homebrew-tap:
    name: Publish Homebrew formula
    needs: resolve-release
    uses: choihunchul/github--actions/.github/workflows/publish-homebrew-formula.yml@main
    with:
      release-repo: ${{ github.repository }}
      tap-repo: choihunchul/homebrew-tap
      formula-name: lazyifconfig
      desc: Terminal UI for inspecting local network state
      homepage: https://github.com/choihunchul/lazyifconfig
      license: MIT
      binary-name: lazyifconfig
      asset-macos-intel: lazyifconfig-{tag}-x86_64-apple-darwin.tar.gz
      asset-macos-arm: lazyifconfig-{tag}-aarch64-apple-darwin.tar.gz
      asset-linux-intel: lazyifconfig-{tag}-x86_64-unknown-linux-gnu.tar.gz
      tag: ${{ needs.resolve-release.outputs.tag }}
      verify-tag: false
    secrets:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
